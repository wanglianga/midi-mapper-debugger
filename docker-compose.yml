services:
  midi-mapper:
    build:
      context: .
      dockerfile: Dockerfile
    image: midi-mapper-debugger:latest
    container_name: midi-mapper-debugger
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - XDG_RUNTIME_DIR=/tmp/runtime-app
      - PULSE_SERVER=unix:/tmp/pulse-socket
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev/snd:/dev/snd
      - midi-data:/app/data
    devices:
      - /dev/snd
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true

volumes:
  midi-data:
